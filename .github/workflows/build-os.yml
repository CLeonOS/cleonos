name: Build CLeonOS

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      menuconfig_preset:
        description: "menuconfig preset (full/minimal/dev)"
        type: choice
        options:
          - full
          - minimal
          - dev
        required: false
        default: "full"
      menuconfig_overrides:
        description: "Optional extra menuconfig args, e.g. --set CLEONOS_CLKS_ENABLE_AUDIO=OFF"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build-os:
    runs-on: ubuntu-latest
    env:
      MENUCONFIG_PRESET: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.menuconfig_preset || 'full' }}
      MENUCONFIG_OVERRIDES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.menuconfig_overrides || '' }}
      NO_COLOR: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare submodules
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git submodule update --init --recursive --force
          if [[ ! -f limine/bootstrap && ! -f limine/configure ]]; then
            git submodule deinit -f limine || true
            rm -rf limine
            git submodule update --init --recursive --force limine
          fi
          test -f limine/bootstrap -o -f limine/configure

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3 \
            tar \
            xorriso \
            mtools \
            autoconf \
            automake \
            libtool \
            pkg-config \
            nasm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate menuconfig with bdt
        shell: bash
        run: |
          set -euo pipefail
          make menuconfig \
            MENUCONFIG_PRESET="${MENUCONFIG_PRESET}" \
            MENUCONFIG_ARGS="--defaults --non-interactive ${MENUCONFIG_OVERRIDES}"
          echo "menuconfig generated with preset=${MENUCONFIG_PRESET}"

      - name: Build ISO with bdt
        run: |
          make iso \
            CC=gcc \
            KERNEL_CXX=g++ \
            LD=ld \
            NM=nm \
            JOBS="$(nproc)"

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cleonos-iso
          path: build/CLeonOS-x86_64.iso
          if-no-files-found: error
